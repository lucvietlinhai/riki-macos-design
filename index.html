<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tạo ảnh Rikimo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: '#3ac6c6',
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Lexend:wght@100..900&family=Noto+Sans+Tai+Viet&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Be Vietnam Pro', sans-serif;
        overflow: hidden; /* Prevent body scroll */
        letter-spacing: -0.01em;
      }
      .scrollbar-thin {
        scrollbar-width: thin;
        /* Light */
        scrollbar-color: #94a3b8 #e2e8f0; /* slate-400 slate-200 */
      }
      .dark .scrollbar-thin {
        /* Dark */
        scrollbar-color: #3f3f46 #09090b; /* zinc-700 zinc-950 */
      }
      .scrollbar-thin::-webkit-scrollbar {
        width: 8px;
      }
      .scrollbar-thin::-webkit-scrollbar-track {
         /* Light */
        background: #e2e8f0; /* slate-200 */
      }
      .dark .scrollbar-thin::-webkit-scrollbar-track {
        /* Dark */
        background: #09090b; /* zinc-950 */
      }
      .scrollbar-thin::-webkit-scrollbar-thumb {
        /* Light */
        background-color: #94a3b8; /* slate-400 */
        border-radius: 10px;
        border: 2px solid #e2e8f0; /* slate-200 */
      }
      .dark .scrollbar-thin::-webkit-scrollbar-thumb {
        /* Dark */
        background-color: #3f3f46; /* zinc-700 */
        border: 2px solid #09090b; /* zinc-950 */
      }
      .checkerboard {
        background-color: #e2e8f0; /* slate-200 */
        background-image:
          linear-gradient(45deg, #cbd5e1 25%, transparent 25%),
          linear-gradient(-45deg, #cbd5e1 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #cbd5e1 75%),
          linear-gradient(-45deg, transparent 75%, #cbd5e1 75%);
        background-size: 20px 20px;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      }
       .dot-grid {
        background-image: radial-gradient(circle, hsl(220 13% 85%) 1px, transparent 1px);
        background-size: 20px 20px;
      }
      .dark .dot-grid {
        background-image: radial-gradient(circle, #27272a 1px, transparent 1px);
      }
    </style>
  <script type="importmap">

    "react": "https://aistudiocdn.com/react@^19.1.1",

  }
}
</script>

</head>
